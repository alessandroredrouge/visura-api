services:
  visure-service:
    build: .
    ports:
      - "8020:8020"
    environment:
      - PYTHONUNBUFFERED=1
      - DISPLAY=:99
    env_file:
      - .env
    volumes:
      - ./:/app
      - ./logs:/app/logs:rw
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8020/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    # Per debugging, rimuovi in produzione
    stdin_open: true
    tty: true